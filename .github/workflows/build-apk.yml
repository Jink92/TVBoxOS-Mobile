name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      buildType:
        description: '构建类型'
        required: false
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # Create local.properties pointing to Android SDK
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "local.properties created with sdk.dir=$ANDROID_HOME"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.5

      - name: Build Debug APK (Java flavor)
        if: ${{ inputs.buildType == 'debug' || inputs.buildType == 'both' || !inputs.buildType }}
        run: |
          chmod +x gradlew
          ./gradlew assembleJavaDebug

      - name: Build Release APK (Java flavor)
        if: ${{ inputs.buildType == 'release' || inputs.buildType == 'both' || !inputs.buildType }}
        run: |
          chmod +x gradlew
          ./gradlew assembleJavaRelease

      - name: List Output Files
        run: |
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"
          ls -la local.properties 2>/dev/null || echo "local.properties not found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Prepare Artifacts
        run: |
          rm -rf apk/
          mkdir -p apk/
          find app/build/outputs/apk -name "*java*.apk" -exec cp {} apk/ \; 2>/dev/null || echo "No APK files to copy"
          ls -la apk/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TVBoxOS-APK
          path: |
            apk/*.apk