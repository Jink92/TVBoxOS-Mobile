name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      buildType:
        description: '构建类型'
        required: false
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "local.properties created with sdk.dir=$ANDROID_HOME"

      - name: Setup Keystore
        run: |
          echo "KEYSTORE_PATH=${{ github.workspace }}/app/test.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=123456" >> $GITHUB_ENV
          echo "KEY_ALIAS=key0" >> $GITHUB_ENV
          echo "KEY_PASS=123456" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.5

      - name: Build Debug APK
        if: ${{ inputs.buildType == 'debug' || inputs.buildType == 'both' || !inputs.buildType }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ inputs.buildType == 'release' || inputs.buildType == 'both' || !inputs.buildType }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: List Output Files
        run: |
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TVBoxOS-Mobile-APK
          path: |
            app/build/outputs/apk/**/*.apk