name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      buildType:
        description: '构建类型'
        required: false
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "local.properties created with sdk.dir=$ANDROID_HOME"

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=TVBox, OU=TVBox, O=TVBox, L=Beijing, ST=Beijing, C=86"
          echo "KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=release" >> $GITHUB_ENV
          echo "KEY_PASS=android" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.5

      - name: Build Debug APK
        if: ${{ inputs.buildType == 'debug' || inputs.buildType == 'both' || !inputs.buildType }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ inputs.buildType == 'release' || inputs.buildType == 'both' || !inputs.buildType }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: List Output Files
        run: |
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Prepare Artifacts
        run: |
          rm -rf apk/
          mkdir -p apk/
          find app/build/outputs/apk -name "MBox_*.apk" -exec cp {} apk/ \; 2>/dev/null || echo "No APK files to copy"
          ls -la apk/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TVBoxOS-APK
          path: |
            apk/*.apk